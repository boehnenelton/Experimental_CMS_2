<!-- Component: Admin Form Row | Type: Backend Fragment | Version: 1.1.0 -->
<div style="margin-bottom: 24px;">
    <label style="display: block; font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.1em;">{{ label }}</label>
    {% if type == 'textarea' %}
    <textarea name="{{ name }}" placeholder="{{ placeholder }}" style="width: 100%; background: var(--bg-page); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; font-family: var(--font-mono); font-size: 0.85rem; color: var(--text-main); min-height: 100px;">{{ value or '' }}</textarea>
    {% elif type == 'select' %}
    <select name="{{ name }}" style="width: 100%; background: var(--bg-page); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; font-weight: 600; color: var(--text-main);">
        {% for opt in options %}
        <option value="{{ opt.value }}" {% if opt.value == value %}selected{% endif %}>{{ opt.label }}</option>
        {% endfor %}
    </select>
    {% else %}
    <input type="{{ type or 'text' }}" name="{{ name }}" value="{{ value or '' }}" placeholder="{{ placeholder }}" style="width: 100%; background: var(--bg-page); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; font-weight: 600; color: var(--text-main);" {% if required %}required{% endif %}>
    {% endif %}
    {% if help %}<p style="font-size: 0.7rem; color: var(--text-muted); margin-top: 6px; text-transform: uppercase;">{{ help }}</p>{% endif %}
</div>
